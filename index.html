<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>俄罗斯方块 - Tetris</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f23;
    color: #fff;
    font-family: "Arial", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 10px;
  }
  canvas {
    border: 2px solid #4a4a6a;
    border-radius: 4px;
    max-width: 100%;
    height: auto;
    touch-action: none;
  }
  #loading {
    position: fixed;
    inset: 0;
    background: #0f0f23;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    gap: 20px;
  }
  #loading .spinner {
    width: 50px; height: 50px;
    border: 4px solid #333;
    border-top-color: #00f0f0;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: #888; font-size: 16px; }
  .controls-info {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 5px;
  }
  .controls-info .btn {
    background: #2a2a4e;
    border: 1px solid #4a4a6a;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 18px;
    color: #ccc;
    cursor: pointer;
    touch-action: manipulation;
    min-width: 50px;
  }
  .controls-info .btn:active {
    background: #3a3a5e;
  }
</style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>加载中 ...</p>
  </div>
  <div class="container">
    <canvas id="gameCanvas"></canvas>
    <div class="controls-info">
      <button class="btn" id="btnLeft">◀</button>
      <button class="btn" id="btnRotate">↻</button>
      <button class="btn" id="btnDown">▼</button>
      <button class="btn" id="btnDrop">⏬</button>
      <button class="btn" id="btnRight">▶</button>
    </div>
  </div>

  <script src="wasm_exec.js"></script>
  <script>
    const loadingEl = document.getElementById("loading");

    if (!WebAssembly.instantiateStreaming) {
      WebAssembly.instantiateStreaming = async (resp, importObject) => {
        const source = await (await resp).arrayBuffer();
        return await WebAssembly.instantiate(source, importObject);
      };
    }

    const go = new Go();
    WebAssembly.instantiateStreaming(fetch("tetris.wasm"), go.importObject)
      .then(result => {
        loadingEl.style.display = "none";
        go.run(result.instance);

        // Wait for WASM to set up, then bind buttons to dispatch on DOCUMENT (not window)
        setTimeout(() => {
          function dispatchKey(key) {
            document.dispatchEvent(new KeyboardEvent("keydown", {key: key, bubbles: true}));
          }
          document.getElementById("btnLeft").addEventListener("click", () => dispatchKey("ArrowLeft"));
          document.getElementById("btnRight").addEventListener("click", () => dispatchKey("ArrowRight"));
          document.getElementById("btnRotate").addEventListener("click", () => dispatchKey("ArrowUp"));
          document.getElementById("btnDown").addEventListener("click", () => dispatchKey("ArrowDown"));
          document.getElementById("btnDrop").addEventListener("click", () => dispatchKey(" "));
        }, 500);
      })
      .catch(err => {
        loadingEl.innerHTML = "<p style=\"color:#f00;\">加载失败: " + err.message + "</p>";
        console.error(err);
      });
  </script>
</body>
</html>
